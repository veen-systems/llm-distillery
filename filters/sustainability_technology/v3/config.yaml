filter:
  name: sustainability_technology
  version: "3.0"
  description: "LCSA-based climate tech assessment with Gemma-3-1B and isotonic calibration"
  framework: "Life Cycle Sustainability Assessment (LCSA)"

# Per-filter source-type allowlist (NexusMind#189). Aggregator stays
# allowed (techcrunch-style coverage is legitimate); only the three
# explicitly-bad types are excluded. Phase 4a — enforcing after 4 cycles
# of shadow-mode evidence (6 medium-tier losses, all noise: Windows 11,
# iPhone, GitHub repos).
source_filter:
  excluded_source_types: [code_repo, developer_aggregator, firehose_aggregator]
  shadow_mode: false

prefilter:
  enabled: true
  expected_pass_rate: 0.20
  description: "Blocks off-topic and shopping content; wide sustainability keyword net passes tech and policy coverage"

scoring:
  score_scale_factor: 1.3535  # 10.0 / 7.39 (calibrated max)

  dimensions:
    technology_readiness_level:
      weight: 0.15
      description: "Deployment stage (TRL 1-9)"

    technical_performance:
      weight: 0.15
      description: "Real-world reliability and efficiency"

    economic_competitiveness:
      weight: 0.20
      description: "Life Cycle Cost (LCC) competitiveness"

    life_cycle_environmental_impact:
      weight: 0.30
      description: "Holistic environmental assessment"

    social_equity_impact:
      weight: 0.10
      description: "Jobs, ethics, equitable access"

    governance_systemic_impact:
      weight: 0.10
      description: "Systemic disruption potential"

  # Mirrors base_scorer.py TIER_THRESHOLDS, the runtime source of truth — this
  # block is documentation (read by no code; the normalization fitter reads it
  # only to warn on drift). Until 2026-07-17 it claimed medium: 3.0 plus a
  # medium_high: 5.0 the runtime never had; the op-point is and was 4.0, and
  # v3's normalization is fitted at 4.0.
  tiers:
    high_sustainability:
      threshold: 7.0
      description: "Mass deployed, proven sustainable, competitive"
      translate: true

    medium:
      threshold: 4.0
      description: "Commercial deployment or pilot with good sustainability"
      translate: true

    low:
      threshold: 0.0
      description: "Lab stage or poor sustainability performance"
      translate: false

  gatekeepers:
    trl_gatekeeper:
      dimension: technology_readiness_level
      threshold: 3.0
      max_score: 2.2  # Raw cap matching base_scorer.py GATEKEEPER_CAP; scaled to ~2.98 by score_scale_factor 1.3535 (below the medium tier, 4.0)
      reason: "Lab-only technologies cannot achieve high overall sustainability scores"

oracle:
  recommended: gemini-flash

training:
  target_samples: 8000
  recommended_model: "google/gemma-3-1b-pt"
  dataset: "datasets/training/sustainability_technology_v3"

preprocessing:
  # Head+tail extraction: keeps first N + last M tokens, discards middle
  # Enable when deploying model trained with --use-head-tail flag
  head_tail:
    enabled: true  # Head+tail trained model deployed
    head_tokens: 256
    tail_tokens: 256
    separator: " [...] "

hybrid_inference:
  stage1:
    embedding_model: "intfloat/multilingual-e5-small"
    probe_path: "probe/embedding_probe_e5small.pkl"
    threshold: 1.25  # Will be recalibrated after training
  stage2:
    model: "current"  # Uses existing SustainabilityTechnologyScorer

deployment:
  inference_time: "~20ms"
  inference_time_hybrid: "~12ms avg"
  cost_per_article: "$0.00"
  use_cases:
    - "Climate tech assessment for investment due diligence"
    - "Sustainable technology trend monitoring"
    - "Counter-programming to greenwashing with LCSA-grounded scoring"
    - "ovr.news Sustainability tab"
